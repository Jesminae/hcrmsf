<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HCRMS Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrapper">

  <div class="login-card">
    <h3>LOGIN</h3>

    <form id="loginForm">

      <label>ROLE *</label>
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="student">Student</option>
        <option value="warden">Warden</option>
        <option value="committee">Hostel Committee</option>
      </select>

      <label>USERNAME *</label>
      <input type="text" id="username" required>

      <label>PASSWORD *</label>
      <div class="password-box">
        <input type="password" id="password" required>
        <span onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">✔ Login</button>
    </form>
  </div>

</div>

<script>
function togglePassword() {
  const pwd = document.getElementById("password");
  pwd.type = pwd.type === "password" ? "text" : "password";
}

/* LOGIN LOGIC */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    role: document.getElementById("role").value,
    username: document.getElementById("username").value,
    password: document.getElementById("password").value
  };

  fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(response => {

    if (response.error) {
      alert(response.error);
      return;
    }

    const role = response.user.role.toLowerCase().trim();

    localStorage.setItem("userRole", role);
    localStorage.setItem("userName", response.user.name);
    localStorage.setItem("username", response.user.username);
    localStorage.setItem("roomNo", response.user.room_no || "");

    if (role === "student") {
      window.location.href = "student-dashboard.html";
    } else if (role === "warden") {
      window.location.href = "warden-dashboard.html";
    } else {
      window.location.href = "committee-dashboard.html";
    }
  })
  .catch(() => alert("Login failed"));
});
</script>

</body>
</html>
